name: Publish to NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Build
        run: npm run build
      
      - name: Test
        run: npm test

      - name: Package smoke
        run: |
          npm pack --dry-run
          npm pack
          package_file="$(ls eval2otel-*.tgz | head -n1)"
          mkdir /tmp/eval2otel-smoke
          npm install --prefix /tmp/eval2otel-smoke "$package_file"
          node -e "const pkg = require('/tmp/eval2otel-smoke/node_modules/eval2otel'); if (!pkg.createEval2Otel || !pkg.EVAL2OTEL_CONTRACT_VERSION) process.exit(1)"
      
      - name: Publish to NPM
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
